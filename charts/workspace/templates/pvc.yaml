apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "workspace.fullname" . }}-files
  labels:
    {{- include "workspace.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.storage.size }}
  storageClassName: {{ .Values.storage.storageClassName }}
