# JWT secret used by the workspace to verify tokens from the control plane.
# On first install we generate a random value; on upgrade we preserve whatever
# is already there (lookup returns the existing Secret) unless .Values.jwt.secret
# explicitly overrides it.
{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.jwt.secretName -}}
{{- $secret := "" -}}
{{- if .Values.jwt.secret -}}
  {{- $secret = .Values.jwt.secret -}}
{{- else if and $existing $existing.data (index $existing.data "secret") -}}
  {{- $secret = index $existing.data "secret" | b64dec -}}
{{- else -}}
  {{- $secret = randAlphaNum 64 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.jwt.secretName }}
  labels:
    {{- include "workspace.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ $secret | quote }}
