{{/*
Postgres credentials need to be in the workspace's own namespace (Pods can't
secretKeyRef across namespaces). We lookup the CNPG-managed cluster credentials
on every helm install/upgrade and mirror them. In production the control plane
does this copy as part of `WorkspaceManager.provision!`; here the chart does it
itself for the standalone install path.
*/}}
{{- $src := lookup "v1" "Secret" .Values.postgres.clusterNamespace .Values.postgres.credentialsSecret -}}
{{- if not $src -}}
{{- fail (printf "CNPG credentials secret %s/%s not found. Is the carbide-pg cluster running?" .Values.postgres.clusterNamespace .Values.postgres.credentialsSecret) -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.credentialsSecret }}
  labels:
    {{- include "workspace.labels" . | nindent 4 }}
  annotations:
    carbide.mirrored-from: {{ printf "%s/%s" .Values.postgres.clusterNamespace .Values.postgres.credentialsSecret }}
type: kubernetes.io/basic-auth
data:
  username: {{ index $src.data "username" }}
  password: {{ index $src.data "password" }}
