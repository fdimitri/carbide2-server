apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workspace.fullname" . }}
  labels:
    {{- include "workspace.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate  # RWO PVC + single-replica; no rolling.
  selector:
    matchLabels:
      {{- include "workspace.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "workspace.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "workspace.fullname" . }}
      initContainers:
        # The workspace DB is pre-created by the CNPG Database CR. The app
        # user owns it but cannot CREATE DATABASE on the cluster, so the
        # default db:prepare path (which tries to create dev *and* test DBs)
        # fails. Run migrations only, against our single dev DB.
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bundle", "exec", "rails", "db:migrate"]
          env:
            - name: SKIP_DB_PREPARE
              value: "1"
            - name: RAILS_ENV
              value: {{ .Values.rails.env }}
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.clusterName }}-rw.{{ .Values.postgres.clusterNamespace }}.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: {{ include "workspace.databaseName" . }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: password
      containers:
        - name: workspace
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: rails
              containerPort: {{ .Values.rails.port }}
            - name: worker
              containerPort: {{ .Values.rails.workerPort }}
            - name: vite
              containerPort: {{ .Values.rails.vitePort }}
          env:
            - name: SKIP_DB_PREPARE
              value: "1"
            - name: WORKSPACE_PROJECT_ID
              value: {{ .Values.projectId | quote }}
            - name: RAILS_ENV
              value: {{ .Values.rails.env }}
            - name: PORT
              value: {{ .Values.rails.port | quote }}
            - name: WORKER_PORT
              value: {{ .Values.rails.workerPort | quote }}
            - name: VITE_PORT
              value: {{ .Values.rails.vitePort | quote }}
            - name: PROJECTS_ROOT
              value: /srv/projects

            # --- Postgres (CNPG) ---
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.clusterName }}-rw.{{ .Values.postgres.clusterNamespace }}.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: {{ include "workspace.databaseName" . }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: password

            # --- JWT ---
            - name: WORKSPACE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jwt.secretName }}
                  key: secret

            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          volumeMounts:
            - name: files
              mountPath: /srv/projects
          readinessProbe:
            httpGet:
              path: /up
              port: rails
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /up
              port: rails
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: {{ include "workspace.fullname" . }}-files
