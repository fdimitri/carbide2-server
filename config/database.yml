# Postgres-only configuration. SQLite is intentionally not supported as a
# runtime backend. Connection details come from environment variables; the
# defaults match the docker-compose service names.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     <%= ENV.fetch("POSTGRES_HOST", "postgres") %>
  port:     <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV.fetch("POSTGRES_USER", "carbide") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "carbide") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "carbide2_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB_TEST", "carbide2_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "carbide2_production") %>
